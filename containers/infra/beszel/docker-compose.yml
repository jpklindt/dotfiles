services:
  beszel:
    image: docker.io/henrygd/beszel:latest
    labels:
      - "io.containers.autoupdate=registry"
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: http://localhost:8090
    ports:
      - 8090:8090
    volumes:
      - beszel_data:/beszel_data:Z
      - beszel_socket:/beszel_socket:Z
    # healthcheck:
    #   test: ['CMD', '/beszel', 'health', '--url', 'http://localhost:8090']
    #   interval: 120s
    #   start_period: 10s
    #   timeout: 5s

  beszel-agent:
    image: docker.io/henrygd/beszel-agent:latest
    labels:
      - "io.containers.autoupdate=registry"
    container_name: beszel-agent
    restart: unless-stopped
    security_opt:
      - label=disable
    network_mode: host
    volumes:
      - beszel_agent_data:/var/lib/beszel-agent:Z
      - beszel_socket:/beszel_socket:Z
      - $XDG_RUNTIME_DIR/podman/podman.sock:/var/run/docker.sock:ro
      - /run/user/986/podman/podman.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      EXTRA_SERVICES: "backup-kopia,backup-offsite,backup-mirror"
      HUB_URL: http://localhost:8090
      TOKEN: ${BESZEL_AGENT_TOKEN}
      KEY: ${BESZEL_AGENT_KEY}
    # healthcheck:
    #   test: ['CMD', '/agent', 'health']
    #   interval: 120s

volumes:
  beszel_data:
  beszel_socket:
  beszel_agent_data:
