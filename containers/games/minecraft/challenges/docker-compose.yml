# NOTE
# This file is purposely named spiget with an "e" since it provides an example of the
# feature https://docker-minecraft-server.readthedocs.io/en/latest/mods-and-plugins/spiget/
# which uses the Spiget API at https://spiget.org/

services:
  mc:
    image: itzg/minecraft-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      SPIGET_RESOURCES: 80548
      REMOVE_OLD_MODS: true
      ENABLE_RCON: true
    volumes:
      - "./spigot.yml:/data/spigot.yml"
      - "./paper-global.yml:/data/paper-global.yml"
      - "./paper-world.yml:/data/paper-world.yml"
      - "./ops.json:/data/ops.json"
      - ./data:/data
