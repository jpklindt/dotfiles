services:
  mc:
    image: itzg/minecraft-server
    environment:
      EULA: "true"
      TYPE: FABRIC
      MEMORY: 5G
      VERSION: 1.21.5
      SEED: "-970179784006593447"
      VIEW_DISTANCE: 24
      MODS_FILE: ./mods.txt
      WHITELIST: "true"
      MOTD: "wahrscheinlich nicht ohne crashes!"
      SPAWN_PROTECTION: "0"
      DIFFICULTY: "hard"
    restart: always
    ports:
      - "25565:25565"
    volumes:
      - ./data:/data
      - "./mods:/mods"
      - "./mods.txt:/data/mods.txt"
      - "./ops.json:/data/ops.json"