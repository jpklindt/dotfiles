common_packages:
  - git
  - curl
  - neovim
  - btop
  - fish
  - docker
  - docker-compose
  - fzf
  - kitty-terminfo

global_hot_dir: "/srv/appdata"
global_cold_dir: "/srv/data"
global_backup_dir: "/srv/backup"

ansible_ssh_extra_args: "-o SetEnv=TERM=dumb"

paperless_media_dir: "{{ global_hot_dir }}/paperless/media"
paperless_consume_dir: "{{ global_hot_dir }}/paperless/consume"
paperless_archive_dir: "{{ global_hot_dir }}/paperless/media/documents/archive"
