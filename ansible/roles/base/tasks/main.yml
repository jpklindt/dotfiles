---
- name: Install base applications
  ansible.builtin.include_tasks: packages.yml

- name: Ensure admin user exists
  become: true
  ansible.builtin.user:
    name: "{{ vault_admin_username }}"
    password: "{{ vault_admin_password_hash }}"
    groups: wheel
    append: true
    shell: /bin/bash # /usr/bin/fish
    state: present

- name: Enable lingering
  become: true
  ansible.builtin.command: loginctl enable-linger {{ vault_admin_username }}
  args:
    creates: /var/lib/systemd/linger/{{ vault_admin_username }}

- name: Fix XDG_RUNTIME_DIR for su sessions
  become: true
  ansible.builtin.copy:
    dest: /etc/profile.d/xdg_runtime.sh
    mode: "0644"
    content: |
      if [ -z "$XDG_RUNTIME_DIR" ]; then
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
      fi

- name: Allow unprivileged users to bind to ports >= 80
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: "80"
    state: present
    reload: true
