- name: Own data and html dirs as container www-data
  ansible.builtin.command: podman unshare chown 33:33 {{ nextcloud_data_dir }} {{ nextcloud_html_dir }}
  changed_when: false

- name: Copy static quadlet files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ lookup('env', 'HOME') }}/.config/containers/systemd/{{ item }}"
    mode: "0644"
  loop:
    - nextcloud.pod
    - nextcloud-valkey.container
    - nextcloud-cron.timer
  notify: Reload systemd

- name: Template quadlet files
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ lookup('env', 'HOME') }}/.config/containers/systemd/{{ item }}"
    mode: "0644"
  loop:
    - nextcloud-cron.container
    - nextcloud-database.container
    - nextcloud-server.container
  notify:
    - Reload systemd
    - Restart nextcloud server

- name: Start Nextcloud pod
  ansible.builtin.systemd:
    name: nextcloud-pod.service
    state: started
    enabled: true
    scope: user
    daemon_reload: true
