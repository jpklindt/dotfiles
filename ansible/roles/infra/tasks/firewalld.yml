- name: Allow HTTP in firewalld
  become: true
  become_user: root
  ansible.posix.firewalld:
    port: 80/tcp
    permanent: true
    state: enabled
    immediate: true

- name: Allow App Ports in firewalld for direct Vagrant testing
  become: true
  become_user: root
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 80/tcp
    - 2283/tcp # Immich
    - 3001/tcp # Uptime Kuma
    - 8080/tcp # Nextcloud
