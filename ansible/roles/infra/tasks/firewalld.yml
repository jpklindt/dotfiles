- name: Allow HTTP in firewalld
  become: true
  become_user: root
  ansible.posix.firewalld:
    port: 80/tcp
    permanent: true
    state: enabled
    immediate: true

- name: Allow Caddy ports in firewalld
  become: true
  become_user: root
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 80/tcp
    - 443/tcp
