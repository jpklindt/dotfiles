---
# tasks file for roles/uptime_kuma
- name: Create appdata dir
  become: true
  become_user: root
  ansible.builtin.file:
    path: "{{ uptime_kuma_appdata_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ vault_admin_username }}"
    group: "{{ vault_admin_username }}"
    setype: container_file_t

- name: Quadlet directory check
  ansible.builtin.file:
    path: "~/.config/containers/systemd"
    state: directory
    mode: "0755"

- name: Copy container file
  ansible.builtin.copy:
    src: "uptime-kuma.container"
    dest: "~/.config/containers/systemd/uptime-kuma.container"
    mode: "0644"
  notify: Reload systemd

- name: Get actual user UID for Systemd
  ansible.builtin.command: id -u
  register: uptime_kuma_dynamic_uid
  changed_when: false

- name: Start uptime-kuma service
  ansible.builtin.systemd:
    name: uptime-kuma.service
    state: started
    enabled: true
    scope: user
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ uptime_kuma_dynamic_uid.stdout }}"
