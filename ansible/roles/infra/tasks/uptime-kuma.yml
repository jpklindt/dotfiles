---
# tasks file for roles/uptime_kuma
- name: Create appdata dir
  become: true
  become_user: root
  ansible.builtin.file:
    path: "{{ global_hot_dir }}/uptime-kuma"
    state: directory
    mode: "0755"
    owner: "{{ vault_admin_username }}"
    group: "{{ vault_admin_username }}"
    setype: container_file_t

- name: Copy container file
  ansible.builtin.copy:
    src: "uptime-kuma.container"
    dest: "/home/{{ vault_admin_username }}/.config/containers/systemd/uptime-kuma.container"
    mode: "0644"
  notify: Reload systemd

- name: Start uptime-kuma service
  ansible.builtin.systemd:
    name: uptime-kuma.service
    state: started
    enabled: true
    scope: user
    daemon_reload: true
