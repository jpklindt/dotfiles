---
- name: Base Configuration
  hosts: homeservers
  roles:
    - base

- name: Storage Configuration
  hosts: homeservers
  roles:
    - storage

- name: Deploy Apps
  hosts: homeservers
  become: true
  become_user: "{{ vault_admin_username }}"
  pre_tasks:
    - name: Ensure quadlet directory exists
      ansible.builtin.file:
        path: "~/.config/containers/systemd"
        state: directory
        mode: "0755"

  roles:
    - infra
    - immich
    - apps
    - paperless # keep before nextcloud
    - nextcloud
